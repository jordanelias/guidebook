  outcome: Thermoregulation-impaired populations require a narrower ambient temperature range than general accessible building
    s...
  rationale: 'Thermoregulation-impaired populations require a narrower ambient temperature range than general accessible building
    standards. Working target: 18–22°C. Floor: 18°C (WHO minimum; FMS cold threshold). Ceiling: 22°C (MS Uhthoff onset; SCI
    heat risk begins). Above 24°C exceeds WHO vulnerable individual threshold — not acceptable for thermoregulation-impaired
    occupants at rest. Condition for application: Any specification, conflict resolution, or design guidance involving indoor
    thermal environment for NEU (MS, SCI), OFS (POTS, MCAS), or PAIN (FMS) populations. Required action: Apply 18–22°C as
    the working target range. Flag it as derived from clinical evidence synthesis, not from any single accessible building
    standard or OT CPG (none addresses this specifically).'
