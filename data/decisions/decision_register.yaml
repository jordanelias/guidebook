    and supported housing settings. CON-0002 multi-population expansion of A-16 (NDV, OFS, PAIN) is correct; CON-0002 retirement
    of separate MH room is incorrect per CON-0131 (Opus synthesis 2026-03-30). Faerden 2022 d=2.0 for user control in MH room
    is contingent on MH-specific parameters.'
