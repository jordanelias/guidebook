- decision_id: D-0002
  category: D-DOCT
  delegation: DG-NON
  summary: Disability populations are not uniform
  outcome: Disability populations are not uniform
  rationale: 'Disability populations are not uniform. Every person within a population code has a unique experience and unique
    functional limitations, even where there is significant overlap with others who share the same condition. There are different
    ways to struggle with mobility, different ways to be blind, different ways to have MS, different ways to be autistic,
    different ways to have dementia, different ways to experience PTSD. There is no generic ideal for any population. Specifications
    provide ranges and starting points — not definitive answers. It is rare for a disability to be experienced in isolation;
    co-occurring conditions are the norm. Every item specification must acknowledge functional variability within the population
    and discuss how co-occurrence affects the design parameter, because that is the lived reality of the people the guidebook
    serves. Population codes are a high-level organizing principle: at Tier 0 they are comprehensive (mapping all considerations);
    at Tier 1 they offer insight (what to think about for a known population); at Tier 2 they step aside because a person
    is not defined by their disabilities — OT works bottom-up from functional impairments because everything must be uniquely
    tailored to the individual.'
  alternatives_considered:
