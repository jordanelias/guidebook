- decision_id: D-0131
  category: D-METH
  delegation: DG-REVIEW
  summary: Within-Candidate-C substrate selection — RDF/Apache Jena (TDB embedded mode)
    operative; Blazegraph, Neo4j, Memgraph, TigerGraph dismissed within Candidate C
  outcome: >
    For B1 Session 5's evaluation of Candidate C (Graph/triplestore), the operative
    sub-substrate is RDF/Apache Jena in TDB embedded mode. Four alternative
    sub-substrates are dismissed within Candidate C: Blazegraph (deprecated 2020;
    vendor risk unacceptable); Neo4j (single-vendor steward; Cypher partial
    standardization; on-disk format proprietary); Memgraph and TigerGraph (vendor risk
    too high for 12+ year horizon). Selection rationale: (a) RDF format longevity is
    highest of the four sub-substrates given W3C standardization (Turtle, N-Triples,
    JSON-LD, SPARQL all W3C-standardized); (b) Apache Foundation steward eliminates
    single-vendor risk; (c) TDB embedded mode runs as a library against a directory of
    files, closer to SQLite's solo-author profile than Neo4j's server requirement;
    (d) JSON-LD compatibility bridges to JSON tooling for consumers who do not speak
    SPARQL. If Sessions 7-9 select Candidate C and a non-RDF sub-substrate's properties
    later dominate, this decision can be revisited — but the operative substrate for
    Session 5's evaluation is RDF/Apache Jena.
  rationale: >
    The framework §5.3 named two graph sub-substrate families (RDF triplestore;
    property graph) and deferred the within-Candidate-C sub-decision to Session 5 if
    Candidate C survives Session 1's calibration sketch. Session 5 must commit to one
    sub-substrate to evaluate against the 30 criteria — evaluating against the union
    of sub-substrates would conflate candidates. RDF/Jena is selected because format
    longevity dominates other concerns at the 12+ year horizon (S-01 binding):
    W3C-standardized RDF outlives any specific engine; data is portable across
    Jena/RDF4J/Virtuoso/Stardog/Blazegraph regardless of which engine processes it.
    Apache Foundation stewardship eliminates the single-vendor risk that disqualifies
    Blazegraph (deprecated 2020) and constrains Neo4j (single-steward Neo4j Inc.).
    TDB embedded mode addresses the solo-author posture concern (D-03 binding) by
    avoiding a server process — Jena runs as a JVM library against a TDB directory,
    operationally closer to SQLite than to Neo4j or Fuseki server mode.
  alternatives_considered:
  - >-
    Apache Jena Fuseki (server mode) — rejected: server process adds operational
    discipline that solo-author pre-launch posture (D-03) does not need. Embedded TDB
    achieves the same query power without the server.
  - >-
    Blazegraph — rejected: project deprecated 2020 (Amazon acquired/forked into
    Neptune); no active maintenance on the open-source codebase. RDF data would
    survive (W3C-standardized format), but operating against an unmaintained engine
    creates compounding risk.
  - >-
    Neo4j Community Edition — rejected: single-vendor steward (Neo4j Inc.); Cypher's
    openCypher standardization is partial; on-disk format proprietary. Format
    longevity materially weaker than RDF. Operationally simpler than RDF in some ways
    but worse on the doctrinal-binding concerns (longevity, vendor independence).
  - >-
    Memgraph or TigerGraph — rejected: vendor risk too high for a 12+ year horizon.
    Both are newer projects with smaller ecosystems and vendor-dependent toolchains.
