- decision_id: D-0110
  category: D-METH
  delegation: DG-REVIEW
  summary: B1 derivation criteria weighted via tiered scheme (3/2/1) with source-anchored assignment rules
  outcome: 'All 30 derivation criteria from b1-derivation-framework.md §6.2 are weighted under a tiered scheme. Weight 3 (critical-binding)
    is assigned to criteria sourced directly to mission §Doctrinal commitments 1, 3, or 6 (within-population variability first-class;
    Co-1 co-primary; questions-led teaching) — 3 criteria: C-1.3, C-3.1, C-7.4. Weight 2 (important-binding) is assigned to
    criteria sourced to operationalization-binding governance (T-03, T-04, A3, A5, A6, A7, A8, A9, A10, A12, A13, audience-priority,
    project-standards) — 21 criteria. Weight 1 (operational-preference) is assigned to criteria sourced to operational convenience
    or sustainability concerns — 6 criteria. Sum of weights = 57; max candidate score (every criterion native, score 3) =
    171. Per-criterion weight assignments are listed in workplan/b1-criteria-weighting.md §§4.1–4.3.

    '
  rationale: 'The framework''s §6.3 specifies that weighting must precede candidate evaluation — weighting after candidates
    are sketched introduces post-hoc bias toward whichever candidate scored well on lightly-considered criteria. Tiered (3/2/1)
    was chosen over all-equal because all-equal silently flattens the doctrinal anchor: mission §Doctrinal commitments 1,
    3, 6 are foundational claims; T-03/T-04/A6/A9/A10/A12/A13 operationalize them; CI tractability is project survival but
    not doctrinal. Treating all 30 criteria as equal would silently de-prioritize the mission''s foundational claims relative
    to operational convenience — the audit-B-01 silent-compression failure mode. Tiered (3/2/1) was chosen over pure doctrinal-anchor-only
    because pure doctrinal-anchor would assign higher weight only to criteria sourced from mission §Doctrinal commitments
    and 1 to everything else, which is too coarse — operationalization-binding criteria (e.g., A6 §1.2''s tier+evidence_type
    orthogonal encoding) are not optional; they are locked governance. The tiered scheme makes the distinction visible: foundational
    doctrinal (3) > operationalization-binding (2) > operational-preference (1). The assignment rules are mechanical — anyone
    can audit a weight by reading the criterion''s source citation in §4 of the framework and applying the rule in §3.1 of
    the weighting document. Rules do not invite per-criterion judgment, which forecloses the failure mode of bespoke weight-creep.

    '
  alternatives_considered:
  - 'All-equal weighting (each criterion 1/30) — rejected: silently flattens the distinction between foundational doctrinal
    claims and operational convenience criteria. Would, for example, give mission §3 Co-1 co-primary and "CI validation tractability"
    the same weight in storage selection. The audit-B-01 silent-compression failure mode applies to weights as much as to
    wording.'
  - 'Pure doctrinal-anchor-only (mission-sourced weight 3; everything else weight 1) — rejected: too coarse. Operationalization-binding
    criteria sourced to T-03, T-04, A6, A9 are LOCKED governance, not preferences. They are not optional in the way that audit-trail
    preservation across migration is optional. Treating them at weight 1 would misrepresent their force.'
  - 'Per-criterion bespoke weights (every criterion gets a discrete numeric weight per judgment) — rejected: invites weight-creep
    over Sessions 3–6 as evaluations surface new considerations. The mechanical assignment rule prevents this — weights are
    functions of source citations, not of candidate-evaluation findings.'
  - 'Weighting deferred to Session 7 (after candidate evaluation) — rejected: explicitly forbidden by the framework''s §6.3.
    Weighting after candidates are sketched introduces post-hoc bias.'
