  rationale: Every governance doc shipped at A9/A10/A12/A13 references its validator as "CI-integrated" but only the A6/A7/A8
    validators were actually called by ci.yml. The new validators ran successfully in their commit-time smoke tests but were
    not enforced on push. This commit closes the gap. A10 catalog runs in --catalog-only mode pre-launch (full coverage check
    requires per-version review_log files which arrive when the first vN.0 release is prepared). A13 doctrine_recheck runs
    in --cross-ref mode in CI (mechanical passes only); pass 2.6 contamination resampling stays out of CI per A13 §6.5 (human
    judgment runs at scheduled rechecks per cadence triggers, not on every push). Pinning dependencies makes builds reproducible.
  alternatives_considered:
  - 'Add validators to existing schema job (rejected: muddles separation between data-shape and governance-state validation;
    would force the schema job to depend on more files than its current scope)'
  - 'Add a separate job per validator (rejected: 4 jobs of overhead for related concerns; runner cost without benefit)'
  - 'Skip CI integration; rely on commit-time author smoke tests (rejected: A9 closed without CI integration and the gap was
    invisible until A12 S2; CI is the operative reproducibility floor)'
