  outcome: MH de-escalation room is distinct from A-16 (sensory quiet room)
  rationale: 'MH de-escalation room is distinct from A-16 (sensory quiet room). They serve different clinical functions through
    different mechanisms: MH requires exit sightline (PTSD anti-entrapment) and staff access; A-16 requires acoustic isolation
