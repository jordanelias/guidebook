- decision_id: D-0111
  category: D-METH
  delegation: DG-REVIEW
  summary: S-05 migration-out specification — five-deliverable exit standard with binary pass/fail at the criterion level
  outcome: 'Each candidate''s S-05 satisfaction is judged against five concrete export deliverables: (1) full data export
    of all 20 entity types to a generic interchange format (CSV, JSON, JSON-LD, RDF/Turtle, or markdown); (2) relationship
    preservation (N:N, polymorphic, inheritance) in export, even where the format does not natively express them; (3) state
    preservation for cell-level state-machine values, verification statuses, supersedence chains, and audit trails; (4) a
    schema mapping document specifying how the candidate''s storage primitives map to a target form''s primitives such that
    re-import into any of the other three candidates is mechanically tractable (lossless re-import not required; documented
    losses are); (5) export tooling cost ≤ 2 sessions, matching the scale of one Stage A converter (e.g., A6''s convert_sources.py).
    All five deliverables must be satisfied — a candidate satisfying four of five fails S-05 (binary pass/fail; no partial
    scoring).

    '
  rationale: 'S-05 from b1-derivation-framework.md §4.4 specified "Migration-out cost is bounded and documented: if B1''s
    choice is later overturned, the corpus can leave with its semantics intact." That wording is correct as a principle but
    not evaluable as written. This decision operationalizes the principle into five deliverables that each candidate must
    demonstrate in Sessions 3–6. Binary pass/fail prevents the failure mode where a candidate scores 4/5 on partial credit
    and is treated as comparable to a candidate scoring 5/5 — the missing deliverable could be the one that traps the project
    (e.g., a candidate that exports records but loses cell-level state machine values when overturned silently traps the synthesis
    work). The 2-session budget for export tooling is anchored to the observed scale of Stage A converters; if a candidate''s
    export tooling cannot fit in that budget, the migration-out cost is by definition unbounded relative to the project''s
    normal session economics.

    '
  alternatives_considered:
  - 'Weighted partial scoring (candidate scores 0–5 on the deliverables, with weighted sum) — rejected: invites the trap where
    a 4/5 candidate looks comparable to 5/5 but the missing deliverable is the binding-constraint one. Binary pass/fail forces
    the candidate to satisfy all five.'
  - 'Less stringent 3-deliverable standard (full export + relationship preservation + schema mapping) — rejected: state preservation
    is not optional. A candidate that exports records but loses verification statuses or state-machine values traps the synthesis
    work; the project''s epistemic commitments live in those states.'
  - 'More stringent (lossless re-import required for all three other candidates) — rejected: lossless re-import across substrate
    boundaries (e.g., relational → graph → markdown) is not generally achievable; requiring it would dismiss all four candidates
    by construction. Documented losses are sufficient.'
  - 'No 2-session budget cap on export tooling (any tooling cost acceptable as long as documented) — rejected: a candidate
    whose export tooling would take 8 sessions to write has effectively unbounded migration-out cost relative to the project''s
    session economics. The 2-session bound matches the scale of Stage A converters, which is the empirical reference for "tractable
    converter complexity."'
