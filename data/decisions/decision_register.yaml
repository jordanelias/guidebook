- decision_id: D-0134
  category: D-METH
  delegation: DG-REVIEW
  summary: Candidate D dismissed under D-0112 strict-dominance test (0 wins, 18 ties,
    12 losses across 30 criteria); Sessions 7-9 input set reduced to {A, B, C}
  outcome: >
    Per-criterion strict-dominance test applied to Candidate D's H1 configuration produced:
    0 criteria where D > max(A, B, C); 18 criteria where D ties max(A, B, C); 12 criteria
    where D loses to max(A, B, C). By D-0112's strict-dominance specification ("Candidate D
    survives elimination iff there exists at least one criterion i such that D_i > max(A_i,
    B_i, C_i)"), Candidate D is strictly dominated and dismissed without proceeding to
    Session 7 comparative scoring. Transitivity dismisses Candidate D's H2 alternative
    configuration: H2's operational scores can only be worse than H1's (two databases vs
    SQLite + markdown), and H2 cannot satisfy any criterion H1 cannot satisfy. Sessions 7-9
    proceed with three candidates only: A (Markdown + YAML), B (Relational/SQLite), C
    (Graph/RDF).
  rationale: >
    The pivotal criterion was C-5.2 (evidence markers ●/○ enforced per specification
    sentence) — the only criterion where max(A, B, C) = 2 rather than 3 and thus the only
    criterion where D could exceed by scoring 3. D scored 2 on C-5.2 because the hybrid form
    does not provide a structural advantage on sentence-level marker enforcement: spec text
    is markdown either way, and sentence-level enforcement is determined by how prose is
    processed and what marker convention is mandated, not by which substrate non-prose data
    lives in. The structured-marker convention (H1' variant) that could plausibly achieve
    score 3 on C-5.2 is form-agnostic — it works in plain markdown (Candidate A) as well
    as in any hybrid containing markdown. Therefore the structured-marker advantage cannot
    uniquely belong to the hybrid form.

    Three structural observations about hybrid forms (framework §7.1) are confirmed
    mechanically by this evaluation: (1) a hybrid is bounded above by the best of its
    constituent substrates on most criteria; (2) operational criteria compound the hybrid
    burden — D's Cluster IX scored 33%, at the candidate-set floor; (3) solo-author posture
    (D-03 binding) is hostile to hybrids because cognitive overhead of two stores is itself
    a binding constraint. The eliminator test is functioning as designed: D is not dismissed
    because its weighted total is low (it's 84%, between A's 77% and B's 89%); D is dismissed
    because no single criterion uniquely favors the hybrid form over the best singleton.
  alternatives_considered:
  - >-
    Survive D on tie-equivalence (D survives if D_i >= M_i for some i) — rejected by
    D-0112 itself: a tie means the simpler form satisfies equivalently and the hybrid's
    coordination burden is not justified by tie-equivalent satisfaction. The strict-inequality
    threshold was chosen specifically to dismiss D under exactly these conditions.
  - >-
    Re-evaluate H1 with structured-marker convention to push C-5.2 to score 3 — rejected:
    structured-marker convention is form-agnostic. Applying it to Candidate A would push
    A's C-5.2 score from 1 to 3 as well, restoring the dominance. The hybrid does not
    structurally enable structured markers.
  - >-
    Test H2 (RDF + SQLite) before dismissing D entirely — rejected by transitivity: H2's
    operational scores are necessarily worse than H1's; H2 cannot score 3 on C-5.2 because
    RDF does not natively express sentence-level prose markers; therefore H2 cannot satisfy
    any criterion H1 cannot satisfy.
  - >-
    Defer dismissal to Session 7 with all four candidates compared — rejected: D-0112
    explicitly specified "dismissed without further evaluation" precisely to prevent
    weighted-total smuggling of strictly-dominated candidates into selection comparisons.
