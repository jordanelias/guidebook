- decision_id: D-0005
  category: D-DOCT
  delegation: DG-NON
  summary: Best practice means the most accommodating, thoughtful, respectful, dignified, and usable condition achievable
    for th...
  outcome: Best practice means the most accommodating, thoughtful, respectful, dignified, and usable condition achievable
    for th...
  rationale: 'Best practice means the most accommodating, thoughtful, respectful, dignified, and usable condition achievable
    for the disabled person. Best practice is determined by the evidence hierarchy — Tier 1 clinical research, Co-1 lived
    experience, Co-2 OT CPGs, Tier 3 systematic reviews — not by code consensus. Codes are Tier 6: the compliance floor, not
    the aspiration. Code consensus across jurisdictions establishes what most codes agree on; it does not establish what is
    most accommodating or most dignified. A BPC best_practice_synthesis that derives its value solely from code consensus
    is in error. The test: does this specification provide the most accommodating, dignified, usable condition the evidence
    supports — or does it merely reflect what codes agree on?'
  alternatives_considered:
