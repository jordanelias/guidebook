- decision_id: D-0137
  category: D-METH
  delegation: DG-REVIEW
  summary: Selection decision rule for Session 8 = Rule 3 (tradeoff-aware) — weighted
    total + cost-to-native + doctrinal binding force + pre-launch posture
  outcome: >
    Session 8's selection of operative storage form will apply Rule 3 (tradeoff-aware
    selection): weighted total AND cost-to-native AND doctrinal binding force AND the
    project's pre-launch posture (D-03). Rule 3 is the framework's intent per §7
    (calibration sketches must not foreclose selection rationale; the rationale is
    structured deliberation about tradeoffs). Rules 1 and 2 (mechanical highest-total)
    were considered and not adopted because they collapse the selection question into
    a numeric comparison that the framework specifically designed weights and clusters
    to AVOID — the doctrinal anchors (mission §Doctrinal commitments 1, 3, 6; D-03
    pre-launch solo-author; S-01 12+ year horizon) bind beyond what numeric weights
    can capture in a single pass.
  rationale: >
    Three considerations argue for Rule 3 over Rules 1 or 2:

    (1) The B-vs-C gap is 3 weighted points (152 vs 155) — at the noise floor of
    weighting precision. The framework's §6.3 noted that doctrinal-binding criteria
    carry weight beyond their numeric weight; selecting on a 3-point gap when the
    doctrinal anchors (D-03 solo-author binding) pull in the opposite direction
    (favoring B's lower cognitive load over C's expressive richness) would substitute
    numeric mechanics for structured reasoning.

    (2) The A-vs-(B|C) comparison cannot be made on weighted total alone. A's adapted
    ceiling (with 19-29 sessions of investment) is in the same zone as B/C untouched
    (~150-160). The selection between A and B/C is not "which scores higher" but
    "which adaptation path is more sustainable for solo-author pre-launch operations
    over 12+ year horizon."

    (3) Cost-to-native varies materially (19-29 vs 27-42 vs 34-50 sessions). Mechanical
    rules ignore this; Rule 3 incorporates it as a binding consideration.

    Rule 3 does not pre-decide; it commits Session 8 to reasoning from the doctrinal
    anchors and the tradeoff structure rather than from the weighted-total ranking
    alone. Rule 3 is what the framework intended in §7.2's prohibition on calibration-
    sketch-driven selection.
  alternatives_considered:
  - >-
    Rule 1 (highest weighted total wins → C) — rejected: collapses the selection
    question into a numeric comparison; ignores doctrinal binding force beyond what
    weights captured; selects C by a 3-point margin (1.7% of max) which is at the
    noise floor of weighting precision.
  - >-
    Rule 2 (highest weighted total subject to doctrinal-anchor constraint → C, since
    none of three fails a weight-3 criterion at score < 2) — rejected: same outcome
    as Rule 1 because the constraint is non-binding; the doctrinal anchors require
    structured reasoning, not pass/fail filtering.
  - >-
    Rule 4 (lowest cost-to-native subject to acceptable score threshold → A if
    threshold is 75%, B if threshold is 88%) — rejected: threshold selection is itself
    arbitrary without further reasoning; Rule 3 incorporates cost as one consideration
    among others rather than as a binary filter.
  - >-
    Defer rule selection to Session 8 alongside the selection itself — rejected:
    bundling the rule choice with the selection conflates methodology with outcome;
    explicit rule commitment in Session 7 makes Session 8's reasoning auditable
    against a stated rule.
