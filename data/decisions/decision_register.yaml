- decision_id: D-0138
  category: D-DOCT
  delegation: DG-NON
  summary: Operative storage form selection — Candidate B (Relational / SQLite) PROPOSED
    by B1 Session 8; PENDING project-owner adoption per A12 §2.2 D-DOCT default
    delegation
  outcome: >
    Candidate B (Relational / SQLite) is PROPOSED as the operative storage form for
    the guidebook project. The selection is PROVISIONAL pending project-owner adoption.
    Per A12 §2.2, D-DOCT decisions default to DG-NON ("Doctrinal decisions reach into
    all downstream work; they cannot be delegated") — the project owner alone makes
    the canonical commitment. This decision record captures the proposal-of-record;
    adoption converts PROVISIONAL → CANONICAL.

    Selection rationale walks four steps under D-0137's Rule 3 (tradeoff-aware
    selection): (1) Candidate A is eliminated because it scores 2/2/2 on the three
    weight-3 doctrinal criteria operationalizing mission §Doctrinal commitments 1, 3, 6
    — adaptation closes the quantitative gap (19-29 sessions of cell materialization,
    pre-commit hook, query-layer build) but leaves the corpus structure as
    markdown+YAML with custom Python query code, accumulating project-specific
    technical debt over 12+ year horizon; doctrine should be embodied by the form,
    not adapted to. (2) Candidates B (152/171, 89%) and C (155/171, 91%) both natively
    satisfy doctrine (3/3/3 on weight-3 criteria); selection is operational not
    doctrinal. (3) The B-vs-C Cluster IX gap (B 48% vs C 33%) is structural and
    recurring — CI tractability (B's SQLite build vs C's JVM+Jena+SHACL toolchain),
    solo-author operability (SQL broadly known vs SPARQL+SHACL+ontology specialized),
    A10/A12/A13 integration (mechanical SQL migration vs ontology-design methodological
    work). (4) Recurring costs (paid daily over 12+ year horizon) outweigh structural
    advantages (paid once-per-feature) under D-03's "solo-only-permanent is a possible
    end-state" binding; the framework's weighting captures decision priority but not
    temporal frequency. The 3-weighted-point gap C-over-B is at the noise floor of
    weighting precision (1.7% of max) and is correctly broken in B's favor by the
    recurring-cost analysis.

    Selection: B (Relational / SQLite). Within-B sub-substrate: SQLite per D-0120.
    Storage form decision is irrevocable in the sense that synthesis structure for
    12+ years is what's being committed; revisable via formal D-METH amendment if
    the project's posture changes materially. Migration-out cost is bounded per
    D-0111's 5-deliverable standard (PASS).
  rationale: >
    The full rationale is the proposal-of-record document at
    architecture/storage-derivation.md (333 lines, 9 sections). Summary by section:

    §2 Doctrinal foundations: Three weight-3 doctrinal commitments (DC-1
    within-population variability; DC-3 Co-1 evidence co-primacy; DC-6 questions-led
    teaching) + one operational binding (D-03 pre-launch solo, solo-only-permanent
    end-state) + one sustainability commitment (S-01 12+ year horizon). The doctrine
