- decision_id: D-0016
  category: D-DOCT
  delegation: DG-NON
  summary: The guidebook is an advocacy project, not an authority
  outcome: The guidebook is an advocacy project, not an authority
  rationale: The guidebook is an advocacy project, not an authority. It does not teach professional judgment, does not confer
    competence, and is not a registered body, standard-setting organization, or regulatory instrument. It is derived from
    comprehensive research and presents its findings in a multimodal manner to equip people who touch the built environment
    with better questions, better evidence, and better starting points. Readers apply their own professional judgment, informed
    by this material. The guidebook's value is in the quality and comprehensiveness of the research it synthesizes and the
    accessibility of its presentation — not in any claim to authority over practice.
