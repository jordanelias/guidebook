- decision_id: D-0147
  category: D-METH
  delegation: DG-NON
  summary: functional-deficit-auditor skill — ICF alignment audit of item functional-deficit
    framing with FDR trigger criteria
  outcome: >
    New skill: functional-deficit-auditor. Scope: per-item audit of ICF alignment
    in functional-deficit framing. The auditor checks whether each item's stated
    functional deficits use correct ICF-d activity codes, whether the deficit→spatial
    requirement chain is clinically defensible, and whether FDR scenario coverage
    is complete for the item's applicable population groups. Opus required for
    mechanism judgment (deficit→requirement reasoning is clinical, not mechanical).
    Runs as Step 6 in the item-audit-pipeline wrapper. Output: gap entries (category
    EG for evidence gaps, AUDT for alignment findings) to tracking DB gaps table.
  rationale: >
    The existing functional-deficit-researcher (FDR) skill conducts bottom-up OT
    intervention research by functional deficit — it synthesizes new evidence into
    BPC entries. The auditor is a distinct methodological concern: it evaluates
    whether an item's existing FDR framing is ICF-aligned and clinically defensible,
    without conducting new research. This separation follows the project's general
    pattern of distinguishing synthesis skills (Opus, generate content) from audit
    skills (check existing content against criteria). Opus is required because
    the deficit→spatial requirement judgment chain involves clinical reasoning
    (e.g., whether hemiplegia→lateral clearance is supported by the cited OT
    literature), which is beyond checklist application.
  alternatives_considered:
  - >-
    Extend functional-deficit-researcher to include audit mode — rejected: the
    researcher is a synthesis skill (Opus, generates new BPC content from OT
    literature). Adding audit responsibilities would conflate generation with
    evaluation, violating the project's synthesis/audit separation principle.
    The researcher produces; the auditor checks.
  - >-
    Run ICF alignment as a sub-check within evidence-auditor — rejected:
    evidence-auditor evaluates evidence quality (stratum, overclaimed markers,
    uncertain review). ICF alignment is a domain-specific structural check
    (is the ICF code correct? is the deficit→requirement chain valid?) that
    requires FDR domain knowledge, not evidence-quality methodology.
  - >-
    Use Sonnet for the auditor — rejected: the deficit→requirement judgment
    is clinical mechanism reasoning. Sonnet handles checklist application
    (economics-auditor) but ICF alignment requires cross-referencing OT
    intervention literature against spatial parameters, which is dispersed-evidence
    synthesis at the judgment level.
  decision_date: 2026-05-08 03:00
  decided_by: opus_4_6_session_2026-05-08
  model_routing: opus/100/extract
  effort_level: 100
