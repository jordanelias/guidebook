- decision_id: D-0148
  category: D-METH
  delegation: DG-NON
  summary: economics-auditor skill — checklist-based item-level economic framing
    audit at Sonnet tier
  outcome: >
    New skill: economics-auditor. Scope: per-item checklist application for economic
    framing. The auditor checks whether each item has a cost-benefit framing where
    one exists in the evidence base, whether cited economic data is current (freshness
    window per evidence hierarchy), and whether the economic argument is structurally
    complete (claim + evidence + jurisdiction scope). Sonnet tier — no Opus required
    because this is checklist application, not synthesis. Runs as Step 7 in the
    item-audit-pipeline wrapper. Output: gap entries (category EC for economics gaps)
    to tracking DB gaps table.
  rationale: >
    Economics content in the guidebook currently has no systematic per-item audit.
    economics-researcher synthesizes new economic evidence (Sonnet + web search);
    the auditor checks whether existing item specifications have adequate economic
    framing without conducting new research. The checklist pattern keeps the skill
    at Sonnet tier (effort 75), making it economical to run across all items. The
    boundary is explicit: auditor flags gaps; researcher synthesizes evidence to
    fill them. The auditor never triggers economics-researcher inline (CO-0009
    §5.8).
  alternatives_considered:
  - >-
    Extend economics-researcher to include audit mode — rejected: the researcher
    is a web-search-dependent synthesis skill with a 20-source ceiling and
    jurisdiction scope gate. Adding per-item audit would inflate its invocation
    cost and conflate evidence gathering with evidence checking.
  - >-
    Run economics checks within content-gap-analyzer — rejected: content-gap-analyzer
    checks structural completeness of item specifications (missing sections,
    incomplete cross-references). Economics framing requires domain-specific
    checklist knowledge (cost-benefit structure, freshness windows, jurisdiction
    scope) that is beyond structural analysis.
  - >-
    Use Opus for the auditor — rejected: the economics audit is checklist
    application (does the item have a cost-benefit framing? is it current?
    is it complete?). No dispersed-evidence synthesis or clinical mechanism
    judgment is required. Sonnet at effort 75 is sufficient and keeps per-item
