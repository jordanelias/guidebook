- decision_id: D-0108
  category: D-METH
  delegation: DG-REVIEW
  summary: Adopt 4-candidate × 30-criterion derivation framework for B1 storage-form selection
  outcome: 'B1 evaluates four storage-form candidates (Markdown+YAML status-quo-extended; Relational; Graph/triplestore; Hybrid)
    against 30 criteria clustered in 10 bands (Entity & relationship; Cell-level state; Co-1 schema discipline; Synthesis
    metadata; Verification; Cross-cutting axes; Navigation/audience; Time model; Operational; Sustainability) using a uniform
    4-question template per cell (native/adapted/absent; adaptation cost; operational risk; downstream binding). Session 2
    weights criteria; Sessions 3-6 evaluate candidates; Sessions 7-9 select and write architecture/.

    '
  rationale: 'Per workplan-co0007-v3 §B1 (operative plan), B1 evaluates ≥3 storage forms against requirements before committing.
    The framework operationalises that mandate. Four candidates instead of three because the floor is ≥3 and the four named
    candidates each map to a distinct repo-strategy revisit trigger in governance/repo-strategy.md (no migration; same repo
    plus DB; sibling repo for graph; per-component decision). 30 criteria because Session-1 sourcing against doctrinal anchors
    (mission §Doctrinal commitments 1, 3, 6; A6 §§1-4; A5 §6.1; A7; A9; A10; A12; A13) produced 36 distinct requirements across
    4 bands; clustering reduced to 30 criteria across 10 evaluable surfaces. Per-criterion 4-question template keeps cross-candidate
    comparison legible (the alternative — bespoke evaluation per candidate — invites the prejudgment failure mode the framework
    is designed to prevent). Weighting is deferred to Session 2 deliberately — weighting after candidates are sketched introduces
    post-hoc bias toward whichever candidate scored well on lightly-considered criteria. The first-pass candidate × cluster
    sketch in §7 of the framework document is calibration only and is explicitly barred from citation in the eventual selection
    rationale (§7.2). The framework binds the rest of B1: Sessions 3-6 cannot adopt new criteria without amending this decision.

    '
  alternatives_considered:
  - 'Adopt v3''s named 3-candidate set verbatim (graph DB / RDF triplestore / hybrid) — rejected: omits Markdown+YAML status-quo-extended
    which is the lowest-migration-cost candidate and the doctrinal default any storage-form selection must beat to justify
    its switching cost. The omission would have been a silent prejudgment.'
  - 'Single-pass evaluation in one session — rejected: 4 candidates × 30 criteria × 4 questions = 480 evaluations. One session
    cannot do justice to that volume; compression invites superficial reads of candidates that warrant scrutiny.'
  - 'No criteria-weighting at all (treat all criteria as equal) — rejected: doctrinal-anchor criteria (sourced from mission/A6
    commitments) are not equivalent in importance to operational-convenience criteria. Equal weighting silently flattens the
    doctrinal anchor. Session 2 commits the weighting scheme explicitly.'
  - 'Skip the first-pass calibration sketch (§7) — rejected: without a first-pass surface of where each candidate strains,
    Sessions 3-6 budget effort uniformly; that wastes sessions on candidate-criterion cells where the answer is already visible.
    The sketch is bounded by §7.2 to prevent it from becoming prejudgment.'
