- decision_id: D-0004
  category: D-DOCT
  delegation: DG-NON
  summary: Evidence hierarchy is seven tiers
  outcome: Evidence hierarchy is seven tiers
  rationale: Evidence hierarchy is seven tiers. Tier 1 = OT intervention-tested clinical research; Co-1 = lived experience
    / participatory design (CRPD Art. 4.3, co-primary with Tier 1); Tier 2 = NGO/DPO/advocacy guidelines; Co-2 = OT professional
    body CPGs (CAOT, AOTA, RCOT, COTEC, WFOT); Tier 3 = systematic reviews and meta-analyses; Tier 4 = international standards
    with evidence basis; Tier 5 = national beyond-code frameworks; Tier 6 = statutory codes (reference baseline only). OT
    body guidelines = Tier 3 with [Tier 3 — CPG] marker. The evidence hierarchy determines what constitutes best practice.
    Codes (Tier 6) inform us in situations where nothing else can. Where higher-tier evidence exists, it governs.
  alternatives_considered:
  - (seeded record; original alternatives not captured at rule authoring; reviewable)
  decision_date: 2026-03-19 19:00
