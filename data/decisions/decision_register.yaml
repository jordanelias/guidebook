- decision_id: D-0112
  category: D-METH
  delegation: DG-REVIEW
  summary: Hybrid eliminator test — Candidate D dismissed if and only if no criterion shows it satisfying the requirement
    strictly better than max(A, B, C)
  outcome: 'Sessions 3–5 produce per-candidate per-criterion scores 0–3 for Candidates A, B, C (0 = absent; 1 = adapted with
    high cost; 2 = adapted with moderate cost; 3 = native). Session 6 evaluates Candidate D against the same 30 criteria,
    producing scores D_i for each criterion i. For each criterion i, compute M_i = max(A_i, B_i, C_i). Candidate D survives
    elimination iff there exists at least one criterion i such that D_i > M_i (strict inequality). If for all 30 criteria
    D_i ≤ M_i, Candidate D is strictly dominated and dismissed without further evaluation. If D survives, the criteria where
    D outscores its competitors are recorded as the candidate''s distinguishing strengths and feed into Session 7 comparative
    scoring normally.

    '
  rationale: 'The framework''s §7.1 conjectured that Candidate D''s hybrid burden may make it strictly dominated by either
    A-with-query-layer or B-with-prose-as-files. This decision specifies the test that establishes dominance — or fails to.
    Strict dominance (no criterion where D outscores) was chosen over weighted-sum dominance because a weighted-sum test could
    eliminate D when D loses on weight-1 criteria but uniquely wins on a weight-3 criterion. That is the wrong dismissal —
    it would dismiss a candidate that uniquely satisfies a doctrinal-binding criterion. The strict-dominance test ensures
    D is dismissed only when no single criterion shows it as the best satisfier. The threshold uses strict inequality (D_i
    > M_i) — a tie does not count as material betterment because the simpler form satisfies equivalently and Candidate D''s
    hybrid complexity is not justified by tie-equivalent satisfaction.

    '
  alternatives_considered:
  - 'Weighted-sum dominance (D dismissed if sum(weight_i × D_i) < max sum across A, B, C) — rejected: a candidate uniquely
    satisfying a weight-3 criterion (e.g., questions-led query mode) but losing on many weight-1 criteria could be wrongly
    dismissed despite its unique value on the doctrinal-binding criterion.'
  - 'Threshold-based dominance (D dismissed if D''s average score < 0.8 × average max-of-ABC) — rejected: same failure mode
    as weighted-sum, with an arbitrary 0.8 threshold to boot.'
  - 'Tie counts as material betterment (D survives if D_i ≥ M_i for some i) — rejected: a tie means the simpler form satisfies
    equivalently. Candidate D''s hybrid burden is not justified by tie-equivalent satisfaction.'
  - 'Defer the elimination test to Session 7 (evaluate all four candidates, then decide on methodology) — rejected: post-hoc
    elimination methodology design is exactly the failure mode the framework''s §6.3 forbids. The test is specified before
    evaluation runs.'
