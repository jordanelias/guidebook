- decision_id: D-0129
  category: D-METH
  delegation: DG-REVIEW
  summary: Within-Candidate-B substrate selection — SQLite is operative; PostgreSQL and
    DuckDB dismissed within Candidate B
  outcome: >
    For B1 Session 4's evaluation of Candidate B (Relational), the operative sub-substrate
    is SQLite. PostgreSQL and DuckDB are dismissed within Candidate B. SQLite is the
    lowest-risk choice for the project's pre-launch solo-author posture (D-03 binding):
    single-file format; CLI ubiquitous; format documented; SQLite Archive Format is a
    Library of Congress preservation recommendation. PostgreSQL adds operational complexity
    (server process, backup discipline) without a corresponding improvement on solo-author
    binding requirements. DuckDB's analytical-query strength is appealing for audience modes
    but its file format longevity is materially weaker than SQLite (younger project, format
    breaks have occurred). If Sessions 7-9 select Candidate B, this sub-decision can be
    revisited if a different sub-substrate's properties dominate at that point — but the
    operative substrate for Session 4's evaluation is SQLite.
  rationale: >
    The framework §5.2 named three relational sub-substrates (SQLite, PostgreSQL, DuckDB)
    and deferred the within-Candidate-B sub-decision to Session 4 if Candidate B survives
    Session 3's calibration sketch. Session 4 must commit to one sub-substrate to evaluate
    against the 30 criteria — evaluating against the union of sub-substrates would conflate
    candidates. SQLite is selected because (a) format longevity is the strongest of the
    three; (b) solo-author operability matches D-03's pre-launch binding (no server process,
    no infrastructure ops); (c) the project's volume (1,098 records, expected to grow into
    Stage C but bounded) is well within SQLite's operational sweet spot — single-file
    databases up to terabytes are routine for SQLite; the project corpus is megabytes; (d)
    CI integration cost is lowest (regenerate .db on each push from canonical SQL fixtures);
    (e) tool independence is high (any SQLite library in any language reads the format).
    PostgreSQL would be selected if the project required multi-user concurrent writes
    (it does not — solo-author), or schema-level features SQLite lacks (it does not — A6
    state machines, constraints, triggers all available in SQLite). DuckDB would be
    selected if analytical query performance dominated other concerns (it does not — the
    audience-priority modes are well-served by indexed SQLite queries given the corpus
    size).
  alternatives_considered:
  - >-
    PostgreSQL — rejected: server process adds operational discipline that solo-author
    pre-launch posture (D-03) does not need. PostgreSQL's ecosystem advantages (replication,
    extensions, advanced features) are post-launch concerns at best; pre-launch they are
    operational overhead without value-add.
  - >-
    DuckDB — rejected: file format longevity is materially weaker than SQLite (younger
    project, single steward); analytical-query strength does not compensate at the
    project's data volume; the audience-priority modes are well-served by indexed SQLite.
  - >-
    Defer the substrate decision to Session 7 (evaluate Candidate B at the abstract
    "relational" level then pick a substrate after) — rejected: the within-substrate
    differences are large enough that "relational" without a specified substrate is
    underspecified for evaluation. Sessions 7-9 can revisit if the candidate is selected.
