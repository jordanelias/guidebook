- decision_id: D-0003
  category: D-DOCT
  delegation: DG-NON
  summary: Three-Tier Design Hierarchy governs all specifications
  outcome: Three-Tier Design Hierarchy governs all specifications
  rationale: Three-Tier Design Hierarchy governs all specifications. Tier 0 = Universal Design / Code Compliance (population-agnostic,
    fixed values). Tier 1 = Population-Informed Inclusive Design (ranges; median as default). Tier 2 = Person-Specific Co-Design
    (OT assessment resolves position within Tier 1 range). DAR mandatory at all tiers.
