  summary: Compound functioning principle
  outcome: Compound functioning principle
  rationale: 'Compound functioning principle. Co-occurring conditions produce supra-additive disability (MWI: ~16% per additional
    condition; Clarke: 4.52x environment-impairment interaction). Pairwise population conflict resolution (Part 3 §3.8, Part
    5) is necessary but insufficient for intra-individual compound profiles. Compound profiles route to Tier 2 OT co-design.
    The guidebook equips professionals; it does not prescribe compound resolutions. Condition for application: Any specification,
    conflict resolution, or synthesis task involving two or more population codes applying to a single individual. Required
    action: Apply §3.8 Step 0 compound functioning check. If non-additive interaction identified, route to Tier 2 with documented
    interaction mechanism. Do not apply pairwise resolution as if it were sufficient.'
