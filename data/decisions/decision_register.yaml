- decision_id: D-0001
  category: D-DOCT
  delegation: DG-NON
  summary: THE PURPOSE OF THIS GUIDEBOOK IS TO GET PEOPLE TO ASK THE RIGHT QUESTIONS
  outcome: THE PURPOSE OF THIS GUIDEBOOK IS TO GET PEOPLE TO ASK THE RIGHT QUESTIONS
  rationale: 'THE PURPOSE OF THIS GUIDEBOOK IS TO GET PEOPLE TO ASK THE RIGHT QUESTIONS. This is the most important principle
    governing the entire project. The guidebook is not a prescription manual. It is not an authority on measurements. It does
    not dictate values that designers, policymakers, or practitioners must apply. It is a thinking tool that equips people
    to ask the right questions about how to design for accessibility depending on the circumstance. Measurements, ranges,
    and reference data exist to support this process — they serve the questions, not the other way around. Every item specification,
    every BPC synthesis, every piece of guidebook prose must be evaluated against this standard: does it help the reader ask
    better questions about this design element? Does it surface considerations they would not have encountered otherwise?
    Does it make them think more critically about the specific situation they face? When you know better, you do better. A
    designer who knows what questions to ask will produce a better outcome than one who does not — even without perfection,
    even without specialist input. The guidebook aims to raise the floor of understanding for everyone who touches the built
    environment.'
  alternatives_considered:
