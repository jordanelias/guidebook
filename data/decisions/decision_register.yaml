  delegation: DG-NON
  summary: Specification language is tier-appropriate and does not claim authority the project does not have
  outcome: Specification language is tier-appropriate and does not claim authority the project does not have
  rationale: 'Specification language is tier-appropriate and does not claim authority the project does not have. The guidebook
    is an advocacy project (see Core Doctrine), not a standard-setting body. Specification constructions by tier: Tier 0 —
    "Code requires [value] per [standard]" (authority is the code, not the guidebook). Tier 1 — "[Evidence tier] evidence
    supports [value]" or "Best practice based on [N] jurisdictions and [tier] evidence is [value]" (authority is the evidence).
    Tier 2 — "OT assessment determines position within [range] based on [functional parameter]" (authority is the OT). The
    former convention of blanket "shall be" constructions is retired — "shall be" implies mandating authority the project
    does not possess. Always run prose-style-checker before vol2-item-formatter. Existing Part 4 text using "shall be" requires
    a voice pass (A4 or C-stage find-and-replace).'
