name: Resolve DOIs via CrossRef and NCBI

on:
  workflow_dispatch:
    inputs:
      max_resolve:
        description: 'Maximum CrossRef Phase 2 candidates per run'
        required: false
        default: '500'
      skip_no_match_days:
        description: 'Days to skip NO-MATCH rows before retrying'
        required: false
        default: '30'
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC

jobs:
  resolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve DOIs
        env:
          GUIDEBOOK_DB_PATH: data/guidebook.db
          MAX_RESOLVE: ${{ github.event.inputs.max_resolve || '500' }}
          SKIP_NO_MATCH_DAYS: ${{ github.event.inputs.skip_no_match_days || '30' }}
        run: python scripts/resolve_dois.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/guidebook.db
          if git diff --cached --quiet; then
            echo "No DOI changes — nothing to commit"
            exit 0
          fi
          git commit -m "source-verification: DOI resolution via CrossRef+NCBI [$(date -u '+%Y-%m-%d %H:%M')]"
          git pull --rebase origin main
          git push origin main
