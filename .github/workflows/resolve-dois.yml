name: Resolve DOIs via CrossRef

on:
  workflow_dispatch:
    inputs:
      max_resolve:
        description: 'Maximum number of Phase 2 (title search) candidates per run'
        required: false
        default: '100'

jobs:
  resolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve DOIs
        env:
          GUIDEBOOK_DB_PATH: data/db/guidebook.db
          MAX_RESOLVE: ${{ github.event.inputs.max_resolve }}
        run: python scripts/resolve_dois.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/db/guidebook.db
          if git diff --cached --quiet; then
            echo "No DOIs resolved — nothing to commit"
            exit 0
          fi
          git commit -m "source-verification: batch DOI resolution via CrossRef [$(date -u '+%Y-%m-%d %H:%M')]"
          git pull --rebase origin main
          git push origin main
