name: Source verification pipeline (V1)

# 5-phase pipeline per references/audits/verification-pipeline-proposal-2026-05-12-v2.md:
#   Phase 0  PMC extractor (no network)
#   Phase 1a PMID -> DOI via NCBI
#   Phase 1b PMCID -> DOI via NCBI
#   Phase 2a CrossRef structured (person-author academic)
#   Phase 2b CrossRef bibliographic (corporate-author academic)
#   Phase 3  CrossRef type:standard (ISO/EN/BSI/IEC/PAS standards)
#
# State before/after and per-phase counts are written to the pipeline_runs table
# in data/guidebook.db — consistent with the project's SQLite-first tracking pattern.

on:
  workflow_dispatch:
    inputs:
      max_resolve:
        description: 'Max candidates per CrossRef phase (2a/2b/3)'
        required: false
        default: '500'
      skip_no_match_days:
        description: 'Days to skip NO-MATCH rows before retrying'
        required: false
        default: '30'
      rate_limit:
        description: 'Seconds between API calls'
        required: false
        default: '5.0'
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC

# Prevent overlapping runs racing on data/guidebook.db.
concurrency:
  group: source-verification
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve DOIs and verify sources
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run verification pipeline
        env:
          GUIDEBOOK_DB_PATH: data/guidebook.db
          MAX_RESOLVE: ${{ github.event.inputs.max_resolve || '500' }}
          SKIP_NO_MATCH_DAYS: ${{ github.event.inputs.skip_no_match_days || '30' }}
          RATE_LIMIT: ${{ github.event.inputs.rate_limit || '5.0' }}
        run: python scripts/resolve_dois.py

      - name: Build commit message from pipeline_runs
        id: msg
        run: |
          python - <<'PY'
          import sqlite3, os
          c = sqlite3.connect('data/guidebook.db')
          r = c.execute("""
              SELECT run_id, total_resolved,
                     doi_before, doi_after,
                     verified_before, verified_after,
                     pmcid_before, pmcid_after,
                     phase_0_extracted,
                     phase_1a_resolved, phase_1b_resolved,
                     phase_2a_resolved, phase_2b_resolved,
                     phase_3_resolved,
                     phase_1a_transient + phase_1b_transient AS transient
              FROM pipeline_runs
              ORDER BY started_at DESC LIMIT 1
          """).fetchone()
          if not r:
              msg = "source-verification: V1 pipeline run — no run record found"
          else:
              (run_id, total, doi_b, doi_a, ver_b, ver_a,
               pmc_b, pmc_a, p0, p1a, p1b, p2a, p2b, p3, transient) = r
              doi_d = doi_a - doi_b
              ver_d = ver_a - ver_b
              pmc_d = pmc_a - pmc_b
              msg = (
                  f"source-verification: V1 run {run_id} — "
                  f"doi {doi_d:+d} ({doi_a} total), "
                  f"verified {ver_d:+d} ({ver_a} total), "
                  f"pmcid {pmc_d:+d} ({pmc_a} total); "
                  f"phases p0={p0} p1a={p1a} p1b={p1b} p2a={p2a} p2b={p2b} p3={p3}"
                  + (f"; {transient} transient" if transient else "")
              )
          print(msg)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"msg={msg}\n")
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/guidebook.db
          if git diff --cached --quiet; then
            echo "No verification changes — nothing to commit"
            exit 0
          fi
          git commit -m "${{ steps.msg.outputs.msg }}"
          # Retry push on race with concurrent main commits.
          for i in 1 2 3 4 5; do
            git pull --rebase origin main || true
            if git push origin main; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed; backing off..."
            sleep $((i * 5))
          done
          echo "ERROR: push failed after 5 attempts"
          exit 1
