name: Repo Integrity Audits

# Per GAP-287 / GAP-290 — converts the CLI audit scripts and the migration runner
# to level-2 (automated checks on every push and PR). Three blocking checks:
#   1. source_slug_links has no duplicate (slug, local_ref_id) pairs
#   2. citation_mining is complete for the current session's T1-2 sources
#   3. The committed data/guidebook.db is reproducible from the migration history
#      (catches direct DB writes that bypassed the migration system)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    name: Audits (citation-mining + source_slug_links + migration-reproducibility)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Read current session pointer
        id: session
        run: |
          if [ -f sessions/LATEST ]; then
            SESSION=$(cat sessions/LATEST | tr -d '\n\r ')
            echo "session=$SESSION" >> "$GITHUB_OUTPUT"
            echo "Current session: $SESSION"
          else
            echo "session=" >> "$GITHUB_OUTPUT"
          fi

      - name: Source-slug-links integrity (BLOCKING regression test)
        env:
          GUIDEBOOK_DB_PATH: data/guidebook.db
        run: python3 scripts/audit/source_slug_links_duplicates.py

      - name: Citation-mining completeness — current session (BLOCKING)
        if: steps.session.outputs.session != ''
        env:
          GUIDEBOOK_DB_PATH: data/guidebook.db
        run: |
          python3 scripts/audit/citation_mining_completeness.py \
            --session "${{ steps.session.outputs.session }}" --tier-max 2

      - name: Migration reproducibility (BLOCKING — GAP-290 enforcement)
        run: |
          # Rebuild a fresh DB from the migration history alone.
          # Compare key invariants vs the committed data/guidebook.db.
          # If they diverge, someone wrote directly to the DB and bypassed migrations.
          python3 scripts/migrate_db.py --rebuild /tmp/rebuilt.db

          python3 - <<'PY'
          import sqlite3, sys
          committed = sqlite3.connect("data/guidebook.db")
          rebuilt = sqlite3.connect("/tmp/rebuilt.db")
          queries = [
              ("PRAGMA user_version", "schema_version"),
              ("SELECT COUNT(*) FROM evidence_sources", "evidence_sources count"),
              ("SELECT COUNT(*) FROM citation_mining", "citation_mining count"),
              ("SELECT COUNT(*) FROM source_slug_links", "source_slug_links count"),
              ("SELECT COUNT(*) FROM gaps", "gaps count"),
              ("SELECT COUNT(*) FROM connections", "connections count"),
              ("SELECT COUNT(*) FROM items", "items count"),
          ]
          mismatches = []
          for sql, label in queries:
              try:
                  c = committed.execute(sql).fetchone()[0]
                  r = rebuilt.execute(sql).fetchone()[0]
                  status = "OK" if c == r else "MISMATCH"
                  print(f"  {label:30} committed={c:>8}  rebuilt={r:>8}  {status}")
                  if c != r:
                      mismatches.append((label, c, r))
              except sqlite3.OperationalError as e:
                  # Table may not exist in older schema versions; skip
                  print(f"  {label:30} skip ({e})")
          if mismatches:
              print()
              print(f"  ERROR: {len(mismatches)} invariant(s) diverge between committed DB and migration history.")
              print(f"  This means someone wrote to data/guidebook.db without emitting a data migration.")
              print(f"  Per GAP-290 resolution, all DB writes must go through scripts/emit_data_migration.py.")
              sys.exit(1)
          print()
          print(f"  PASS: committed DB matches what the migration history produces.")
          PY
        continue-on-error: false

      - name: Citation-mining completeness — global T1-2 backlog (informational)
        continue-on-error: true
        env:
          GUIDEBOOK_DB_PATH: data/guidebook.db
        run: python3 scripts/audit/citation_mining_completeness.py --tier-max 2

      - name: Citation-mining completeness — global T1-3 (informational)
        continue-on-error: true
        env:
          GUIDEBOOK_DB_PATH: data/guidebook.db
        run: python3 scripts/audit/citation_mining_completeness.py --tier-max 3

  attestation_schema:
    runs-on: ubuntu-latest
    name: Attestation schema + presence (blocking)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Validate all changed attestations + presence
        run: |
          set -euo pipefail
          python3 scripts/audit/adherence_log_audit.py --check presence
          python3 scripts/audit/adherence_log_audit.py --check schema

  attestation_evidence:
    runs-on: ubuntu-latest
    name: Attestation evidence (Level 2 shakedown; not blocking)
    needs: attestation_schema
    continue-on-error: true   # Level 2 during shakedown; flip to false after Day-7 gate met
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Run evidence check
        env:
          GUIDEBOOK_DB_PATH: data/guidebook.db
        run: python3 scripts/audit/adherence_log_audit.py --check evidence

  attestation_verdict:
    runs-on: ubuntu-latest
    name: Attestation verdict surface (annotation-only)
    needs: attestation_schema
    continue-on-error: true   # Never blocking by design
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Surface NON-COMPLIANT verdicts
        run: |
          python3 scripts/audit/adherence_log_audit.py --check verdict > /tmp/verdict.txt || true
          if grep -q NON-COMPLIANT /tmp/verdict.txt; then
            echo "::warning::NON-COMPLIANT verdict present in attestation — see /tmp/verdict.txt"
            cat /tmp/verdict.txt
          fi
